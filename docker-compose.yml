services:
  frontend:
    build:
      context: ./frontend
    container_name: smart-classroom-frontend
    command: npm run dev
    env_file:
      - ./frontend/.env
    environment:
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    container_name: smart-classroom-backend
    command: sh -c "npm run prisma:deploy && npm run dev"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://smartclassroom:smartclassroom@postgres:5432/smart_classroom?schema=public
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: smart-classroom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_classroom
      POSTGRES_USER: smartclassroom
      POSTGRES_PASSWORD: smartclassroom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smartclassroom -d smart_classroom']
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  postgres_data:
